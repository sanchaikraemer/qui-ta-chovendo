<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Aqui Tá Chovendo. E aí?</title>
  <meta name="theme-color" content="#f3f4f6" />

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    crossorigin=""
  />

  <style>
    :root{
      --bg:#f3f4f6;
      --card:#ffffff;
      --line:#e5e7eb;
      --text:#1f2937;
      --muted:#6b7280;

      --btn-bg-1:#f8fafc;
      --btn-bg-2:#e5e7eb;
      --btn-text:#1f2937;

      --ok:#16a34a;
      --danger:#dc2626;

      --shadow:0 10px 30px rgba(15,23,42,.08);
      --shadow-soft:0 8px 18px rgba(15,23,42,.08);

      --radius-card:28px;
      --radius-btn:18px;
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      padding:0;
      min-height:100%;
      font-family: Arial, Helvetica, sans-serif;
      color:var(--text);
      background:var(--bg);
    }

    body{
      padding:16px;
    }

    .wrap{
      width:100%;
      max-width:760px;
      margin:0 auto;
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius-card);
      box-shadow:var(--shadow);
      padding:28px 18px 20px;
    }

    h1{
      margin:0 0 10px;
      text-align:center;
      font-size:clamp(30px, 6vw, 48px);
      line-height:1.06;
      letter-spacing:-0.03em;
      color:#334155;
    }

    .subtle{
      margin:0 0 28px;
      text-align:center;
      font-size:15px;
      color:var(--muted);
    }

    .hidden{
      display:none !important;
    }

    .choices{
      max-width:560px;
      margin:0 auto;
    }

    .section-label{
      margin:8px 0 14px;
      font-size:13px;
      font-weight:800;
      text-transform:uppercase;
      letter-spacing:.08em;
      color:#9ca3af;
    }

    .main-buttons{
      display:flex;
      flex-direction:column;
      gap:14px;
      margin-bottom:22px;
    }

    .events-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    .weather-btn{
      width:100%;
      border:none;
      border-radius:var(--radius-btn);
      background:linear-gradient(180deg, var(--btn-bg-1), var(--btn-bg-2));
      color:var(--btn-text);
      box-shadow:var(--shadow-soft);
      cursor:pointer;
      transition:transform .15s ease, box-shadow .15s ease, opacity .15s ease;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:12px;
      text-align:center;
      font-weight:800;
      border:1px solid #edf0f3;
    }

    .weather-btn:hover{
      transform:translateY(-1px);
    }

    .weather-btn:active{
      transform:translateY(0);
    }

    .weather-btn:disabled{
      opacity:.72;
      cursor:not-allowed;
      transform:none;
    }

    .weather-btn.main{
      min-height:72px;
      padding:12px 16px;
      font-size:18px;
    }

    .weather-btn.event{
      min-height:62px;
      padding:10px 12px;
      font-size:17px;
    }

    .emoji{
      font-size:32px;
      line-height:1;
      flex:0 0 auto;
    }

    .weather-btn.event .emoji{
      font-size:28px;
    }

    .status{
      margin-top:18px;
      min-height:22px;
      text-align:center;
      font-size:14px;
      color:var(--muted);
    }

    .status.ok{ color:var(--ok); }
    .status.err{ color:var(--danger); }

    .map-view{
      display:flex;
      flex-direction:column;
      gap:16px;
    }

    .top-bar{
      display:flex;
      flex-wrap:wrap;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding:12px 16px;
      border:1px solid var(--line);
      background:#f8fafc;
      border-radius:16px;
      font-size:16px;
      color:var(--text);
      font-weight:700;
    }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .action-btn{
      border:none;
      border-radius:14px;
      padding:12px 16px;
      font-size:14px;
      font-weight:700;
      cursor:pointer;
      box-shadow:var(--shadow-soft);
    }

    .btn-whats{
      background:#25D366;
      color:#062b16;
    }

    .btn-reset{
      background:#ffffff;
      color:var(--text);
      border:1px solid var(--line);
    }

    #map{
      width:100%;
      height:460px;
      border-radius:22px;
      overflow:hidden;
      border:1px solid var(--line);
      box-shadow:var(--shadow-soft);
    }

    .map-note{
      font-size:13px;
      color:var(--muted);
      text-align:center;
      line-height:1.45;
    }

    .city-mini{
      margin-top:2px;
      font-size:12px;
      color:var(--muted);
      text-align:center;
      opacity:.9;
    }

    @media (max-width:640px){
      body{
        padding:12px;
      }

      .card{
        padding:24px 14px 18px;
        border-radius:24px;
      }

      h1{
        font-size:clamp(28px, 8vw, 40px);
      }

      .subtle{
        font-size:14px;
        margin-bottom:24px;
      }

      .section-label{
        margin:8px 0 12px;
      }

      .main-buttons{
        gap:12px;
        margin-bottom:20px;
      }

      .weather-btn.main{
        min-height:68px;
        font-size:17px;
        padding:10px 14px;
      }

      .weather-btn.event{
        min-height:58px;
        font-size:15px;
        padding:8px 10px;
        gap:8px;
      }

      .emoji{
        font-size:28px;
      }

      .weather-btn.event .emoji{
        font-size:24px;
      }

      .events-grid{
        gap:10px;
      }

      #map{
        height:400px;
      }

      .top-bar{
        flex-direction:column;
        align-items:stretch;
      }

      .actions{
        width:100%;
      }

      .action-btn{
        flex:1 1 0;
        text-align:center;
      }
    }

    @media (max-width:420px){
      .weather-btn.main{
        font-size:16px;
      }

      .weather-btn.event{
        font-size:14px;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <div id="startScreen">
        <h1>Aqui tá chovendo. E aí?</h1>
        <p class="subtle">Marque o que está acontecendo aí agora.</p>

        <div class="choices">
          <div class="section-label">Tempo agora</div>

          <div class="main-buttons">
            <button id="btnRain" class="weather-btn main" type="button">
              <span class="emoji">🌧️</span>
              <span>Aqui tá chovendo</span>
            </button>

            <button id="btnCloud" class="weather-btn main" type="button">
              <span class="emoji">☁️</span>
              <span>Aqui tá nublado</span>
            </button>

            <button id="btnSun" class="weather-btn main" type="button">
              <span class="emoji">☀️</span>
              <span>Aqui tem sol</span>
            </button>
          </div>

          <div class="section-label">Outros eventos</div>

          <div class="events-grid">
            <button id="btnStorm" class="weather-btn event" type="button">
              <span class="emoji">🌩️</span>
              <span>Temporal</span>
            </button>

            <button id="btnFrost" class="weather-btn event" type="button">
              <span class="emoji">❄️</span>
              <span>Geada</span>
            </button>

            <button id="btnHail" class="weather-btn event" type="button">
              <span class="emoji">🧊</span>
              <span>Granizo</span>
            </button>

            <button id="btnWind" class="weather-btn event" type="button">
              <span class="emoji">💨</span>
              <span>Ventania</span>
            </button>
          </div>
        </div>

        <div id="status" class="status"></div>
      </div>

      <div id="mapScreen" class="map-view hidden">
        <div class="top-bar">
          <div class="badge">
            <span id="selectedWeatherIcon">☁️</span>
            <span id="selectedWeatherText">Sua resposta</span>
          </div>

          <div class="actions">
            <button id="btnWhats" class="action-btn btn-whats" type="button">
              Compartilhar no WhatsApp
            </button>

            <button id="btnReset" class="action-btn btn-reset" type="button">
              Voltar
            </button>
          </div>
        </div>

        <div id="map"></div>

        <div class="map-note">
          O mapa mostra a posição capturada no seu celular no momento da marcação.
        </div>

        <div id="mapStatus" class="status"></div>

        <div id="cityMini" class="city-mini"></div>
      </div>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

  <script>
    const TEST_MODE = false;

    const TEST_COORDS = {
      lat: -28.2839,
      lng: -52.7869
    };

    const $ = (id) => document.getElementById(id);

    const startScreen = $("startScreen");
    const mapScreen = $("mapScreen");

    const btnRain = $("btnRain");
    const btnCloud = $("btnCloud");
    const btnSun = $("btnSun");
    const btnStorm = $("btnStorm");
    const btnFrost = $("btnFrost");
    const btnHail = $("btnHail");
    const btnWind = $("btnWind");

    const btnWhats = $("btnWhats");
    const btnReset = $("btnReset");

    const statusEl = $("status");
    const mapStatusEl = $("mapStatus");
    const selectedWeatherText = $("selectedWeatherText");
    const selectedWeatherIcon = $("selectedWeatherIcon");
    const cityMini = $("cityMini");

    let map = null;
    let marker = null;
    let selectedWeather = null;
    let currentCoords = null;

    function setStatus(message = "", type = "") {
      statusEl.textContent = message;
      statusEl.className = "status" + (type ? " " + type : "");
    }

    function setMapStatus(message = "", type = "") {
      mapStatusEl.textContent = message;
      mapStatusEl.className = "status" + (type ? " " + type : "");
    }

    function setButtonsDisabled(disabled) {
      btnRain.disabled = disabled;
      btnCloud.disabled = disabled;
      btnSun.disabled = disabled;
      btnStorm.disabled = disabled;
      btnFrost.disabled = disabled;
      btnHail.disabled = disabled;
      btnWind.disabled = disabled;
    }

    function getWeatherData(value) {
      if (value === "rain") {
        return { icon: "🌧️", label: "Aqui tá chovendo" };
      }
      if (value === "cloud") {
        return { icon: "☁️", label: "Aqui tá nublado" };
      }
      if (value === "sun") {
        return { icon: "☀️", label: "Aqui tem sol" };
      }
      if (value === "storm") {
        return { icon: "🌩️", label: "Temporal" };
      }
      if (value === "frost") {
        return { icon: "❄️", label: "Geada" };
      }
      if (value === "hail") {
        return { icon: "🧊", label: "Granizo" };
      }
      if (value === "wind") {
        return { icon: "💨", label: "Ventania" };
      }

      return { icon: "📍", label: "Sua resposta" };
    }

    function getCurrentPositionAsync() {
      if (TEST_MODE) {
        return Promise.resolve({
          coords: {
            latitude: TEST_COORDS.lat,
            longitude: TEST_COORDS.lng
          }
        });
      }

      return new Promise((resolve, reject) => {
        if (!navigator.geolocation) {
          reject(new Error("Seu navegador não suporta geolocalização."));
          return;
        }

        navigator.geolocation.getCurrentPosition(
          (position) => resolve(position),
          (error) => reject(error),
          {
            enableHighAccuracy: true,
            timeout: 15000,
            maximumAge: 0
          }
        );
      });
    }

    function initMap(lat, lng, choice) {
      const mapContainer = document.getElementById("map");

      if (!map) {
        map = L.map(mapContainer).setView([lat, lng], 13);

        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
          maxZoom: 19,
          attribution: "&copy; OpenStreetMap"
        }).addTo(map);
      } else {
        map.setView([lat, lng], 13);
      }

      if (marker) {
        map.removeLayer(marker);
      }

      const weather = getWeatherData(choice);

     
   const weatherIcon = L.divIcon({
  className: "",
  html: `
    <div style="font-size:36px; line-height:1; filter: drop-shadow(0 2px 3px rgba(0,0,0,.38)) drop-shadow(0 0 4px rgba(0,0,0,.22));">
      ${weather.icon}
    </div>
  `,
  iconSize: [36, 36],
  iconAnchor: [18, 18]
});

      marker = L.marker([lat, lng], {
        icon: weatherIcon
      }).addTo(map);

      setTimeout(() => {
        map.invalidateSize();
      }, 250);
    }

    function showMapScreen(choice, lat, lng) {
      const weather = getWeatherData(choice);

      selectedWeather = choice;
      selectedWeatherText.textContent = weather.label;
      selectedWeatherIcon.textContent = weather.icon;

      startScreen.classList.add("hidden");
      mapScreen.classList.remove("hidden");

      initMap(lat, lng, choice);
    }

    async function handleVote(choice) {
      try {
        setButtonsDisabled(true);
        setStatus(TEST_MODE ? "Abrindo mapa de teste..." : "Obtendo sua localização...");

        const position = await getCurrentPositionAsync();
        const lat = position.coords.latitude;
        const lng = position.coords.longitude;

        currentCoords = { lat, lng };

        setStatus("");
        showMapScreen(choice, lat, lng);
        setMapStatus(TEST_MODE ? "Modo teste local ativo." : "Localização obtida com sucesso.", "ok");
      } catch (err) {
        console.error(err);

        let msg = "Não foi possível continuar.";

        if (err && typeof err.code !== "undefined") {
          if (err.code === 1) msg = "Permissão de localização negada.";
          else if (err.code === 2) msg = "Não foi possível obter sua localização.";
          else if (err.code === 3) msg = "Tempo esgotado ao buscar localização.";
        } else if (err.message) {
          msg = err.message;
        }

        setStatus(msg, "err");
      } finally {
        setButtonsDisabled(false);
      }
    }

    function shareWhatsApp() {
      const url = window.location.href;
      const weather = getWeatherData(selectedWeather);
      const msg =
        "Como está o tempo aí na sua cidade agora?\n\n" +
        "Eu marquei: " + weather.label + "\n\n" +
        "Veja e marque também:\n" +
        url;

      const shareUrl = "https://wa.me/?text=" + encodeURIComponent(msg);
      window.open(shareUrl, "_blank");
    }

    function resetView() {
      mapScreen.classList.add("hidden");
      startScreen.classList.remove("hidden");
      setStatus("");
      setMapStatus("");
      cityMini.textContent = "";
    }

    btnRain.addEventListener("click", () => handleVote("rain"));
    btnCloud.addEventListener("click", () => handleVote("cloud"));
    btnSun.addEventListener("click", () => handleVote("sun"));
    btnStorm.addEventListener("click", () => handleVote("storm"));
    btnFrost.addEventListener("click", () => handleVote("frost"));
    btnHail.addEventListener("click", () => handleVote("hail"));
    btnWind.addEventListener("click", () => handleVote("wind"));

    btnWhats.addEventListener("click", shareWhatsApp);
    btnReset.addEventListener("click", resetView);
  </script>
</body>
</html>
