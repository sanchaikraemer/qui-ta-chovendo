<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Aqui Tá Chovendo. E aí?</title>
  <meta name="theme-color" content="#f3f4f6" />
  <meta name="description" content="Mapa colaborativo do tempo em tempo real." />

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    crossorigin=""
  />
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"
  />
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"
  />

  <style>
    :root{
      --bg:#f3f4f6;
      --card:#ffffff;
      --line:#e5e7eb;
      --text:#1f2937;
      --muted:#6b7280;
      --btn-bg-1:#f8fafc;
      --btn-bg-2:#e5e7eb;
      --btn-text:#1f2937;
      --ok:#16a34a;
      --danger:#dc2626;
      --accent:#cbd5e1;
      --shadow:0 10px 30px rgba(15,23,42,.08);
      --shadow-soft:0 8px 18px rgba(15,23,42,.08);
      --radius-card:28px;
      --radius-btn:18px;
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      padding:0;
      min-height:100%;
      font-family: Arial, Helvetica, sans-serif;
      color:var(--text);
      background:var(--bg);
    }

    body{ padding:16px; }

    .wrap{
      width:100%;
      max-width:760px;
      margin:0 auto;
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius-card);
      box-shadow:var(--shadow);
      padding:28px 18px 20px;
    }

    h1{
      margin:0 0 10px;
      text-align:center;
      font-size:clamp(30px, 6vw, 48px);
      line-height:1.06;
      letter-spacing:-0.03em;
      color:#334155;
    }

    .subtle{
      margin:0 0 28px;
      text-align:center;
      font-size:15px;
      color:var(--muted);
    }

    .hidden{ display:none !important; }

    .choices{
      max-width:560px;
      margin:0 auto;
    }

    .section-label{
      margin:8px 0 14px;
      font-size:13px;
      font-weight:800;
      text-transform:uppercase;
      letter-spacing:.08em;
      color:#9ca3af;
    }

    .main-buttons{
      display:flex;
      flex-direction:column;
      gap:14px;
      margin-bottom:22px;
    }

    .events-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    .weather-btn{
      width:100%;
      border:none;
      border-radius:var(--radius-btn);
      background:linear-gradient(180deg, var(--btn-bg-1), var(--btn-bg-2));
      color:var(--btn-text);
      box-shadow:var(--shadow-soft);
      cursor:pointer;
      transition:transform .15s ease, opacity .15s ease;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:12px;
      text-align:center;
      font-weight:800;
      border:1px solid #edf0f3;
    }

    .weather-btn:hover{ transform:translateY(-1px); }
    .weather-btn:active{ transform:translateY(0); }
    .weather-btn:disabled{
      opacity:.72;
      cursor:not-allowed;
      transform:none;
    }

    .weather-btn.main{
      min-height:72px;
      padding:12px 16px;
      font-size:18px;
    }

    .weather-btn.event{
      min-height:62px;
      padding:10px 12px;
      font-size:17px;
    }

    .emoji{
      font-size:32px;
      line-height:1;
      flex:0 0 auto;
    }

    .weather-btn.event .emoji{
      font-size:28px;
    }

    .status{
      margin-top:18px;
      min-height:22px;
      text-align:center;
      font-size:14px;
      color:var(--muted);
    }

    .status.ok{ color:var(--ok); }
    .status.err{ color:var(--danger); }

    .map-view{
      display:flex;
      flex-direction:column;
      gap:16px;
    }

    .top-bar{
      display:flex;
      flex-wrap:wrap;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding:12px 16px;
      border:1px solid var(--line);
      background:#f8fafc;
      border-radius:16px;
      font-size:16px;
      color:var(--text);
      font-weight:700;
    }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .action-btn{
      border:none;
      border-radius:14px;
      padding:12px 16px;
      font-size:14px;
      font-weight:700;
      cursor:pointer;
      box-shadow:var(--shadow-soft);
    }

    .btn-whats{
      background:#25D366;
      color:#062b16;
    }

    .btn-reset{
      background:#ffffff;
      color:var(--text);
      border:1px solid var(--line);
    }

    #map{
      width:100%;
      height:460px;
      border-radius:22px;
      overflow:hidden;
      border:1px solid var(--line);
      box-shadow:var(--shadow-soft);
    }

    .map-note{
      font-size:13px;
      color:var(--muted);
      text-align:center;
      line-height:1.45;
    }

    .city-mini{
      margin-top:2px;
      font-size:12px;
      color:var(--muted);
      text-align:center;
      opacity:.9;
    }

    .smart-hint{
      margin-top:10px;
      font-size:13px;
      text-align:center;
      color:#64748b;
    }

    .leaflet-div-icon{
      background:transparent;
      border:none;
    }

    .my-marker-wrap{
      position:relative;
      display:flex;
      align-items:center;
      justify-content:center;
      width:40px;
      height:40px;
    }

    .my-marker-wrap .my-ring{
      position:absolute;
      inset:2px;
      border:2px solid rgba(15,23,42,.25);
      border-radius:50%;
      pointer-events:none;
    }

    .weather-map-emoji{
      font-size:36px;
      line-height:1;
      filter: drop-shadow(0 2px 3px rgba(0,0,0,.38))
              drop-shadow(0 0 4px rgba(0,0,0,.22));
    }

    .my-weather-map-emoji{
      font-size:36px;
      line-height:1;
      filter: drop-shadow(0 2px 3px rgba(0,0,0,.38))
              drop-shadow(0 0 4px rgba(0,0,0,.22));
      transform:scale(1.08);
    }

    .custom-cluster{
      background:transparent;
      border:none;
    }

    .cluster-bubble{
      min-width:48px;
      height:48px;
      padding:0 10px;
      border-radius:999px;
      background:#ffffff;
      border:1px solid #dbe3ea;
      box-shadow:0 8px 18px rgba(15,23,42,.16);
      display:flex;
      align-items:center;
      justify-content:center;
      gap:6px;
      font-weight:800;
      color:#1f2937;
    }

    .cluster-emoji{
      font-size:22px;
      line-height:1;
      filter: drop-shadow(0 1px 2px rgba(0,0,0,.22));
    }

    .cluster-count{
      font-size:14px;
      line-height:1;
    }

    @media (max-width:640px){
      body{ padding:12px; }

      .card{
        padding:24px 14px 18px;
        border-radius:24px;
      }

      h1{
        font-size:clamp(28px, 8vw, 40px);
      }

      .subtle{
        font-size:14px;
        margin-bottom:24px;
      }

      .section-label{
        margin:8px 0 12px;
      }

      .main-buttons{
        gap:12px;
        margin-bottom:20px;
      }

      .weather-btn.main{
        min-height:68px;
        font-size:17px;
        padding:10px 14px;
      }

      .weather-btn.event{
        min-height:58px;
        font-size:15px;
        padding:8px 10px;
        gap:8px;
      }

      .emoji{ font-size:28px; }
      .weather-btn.event .emoji{ font-size:24px; }

      .events-grid{ gap:10px; }

      #map{ height:400px; }

      .top-bar{
        flex-direction:column;
        align-items:stretch;
      }

      .actions{ width:100%; }

      .action-btn{
        flex:1 1 0;
        text-align:center;
      }

      .cluster-bubble{
        min-width:44px;
        height:44px;
        padding:0 8px;
      }
    }

    @media (max-width:420px){
      .weather-btn.main{ font-size:16px; }
      .weather-btn.event{ font-size:14px; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <div id="startScreen">
        <h1>Aqui tá chovendo. E aí?</h1>
        <p class="subtle">Marque o que está acontecendo aí agora.</p>

        <div class="choices">
          <div class="section-label">Tempo agora</div>

          <div class="main-buttons">
            <button id="btnRain" class="weather-btn main" type="button">
              <span class="emoji">🌧️</span>
              <span>Aqui tá chovendo</span>
            </button>

            <button id="btnCloud" class="weather-btn main" type="button">
              <span class="emoji">☁️</span>
              <span>Aqui tá nublado</span>
            </button>

            <button id="btnSun" class="weather-btn main" type="button">
              <span class="emoji">☀️</span>
              <span>Aqui tem sol</span>
            </button>
          </div>

          <div class="section-label">Outros eventos</div>

          <div class="events-grid">
            <button id="btnStorm" class="weather-btn event" type="button">
              <span class="emoji">🌩️</span>
              <span>Temporal</span>
            </button>

            <button id="btnFrost" class="weather-btn event" type="button">
              <span class="emoji">❄️</span>
              <span>Geada</span>
            </button>

            <button id="btnHail" class="weather-btn event" type="button">
              <span class="emoji">🧊</span>
              <span>Granizo</span>
            </button>

            <button id="btnWind" class="weather-btn event" type="button">
              <span class="emoji">💨</span>
              <span>Ventania</span>
            </button>
          </div>
        </div>

        <div id="status" class="status"></div>
      </div>

      <div id="mapScreen" class="map-view hidden">
        <div class="top-bar">
          <div class="badge">
            <span id="selectedWeatherIcon">☁️</span>
            <span id="selectedWeatherText">Sua resposta</span>
          </div>

          <div class="actions">
            <button id="btnWhats" class="action-btn btn-whats" type="button">
              Compartilhar no WhatsApp
            </button>

            <button id="btnReset" class="action-btn btn-reset" type="button">
              Voltar
            </button>
          </div>
        </div>

        <div id="map"></div>

        <div class="map-note">
          O mapa mostra os pontos ativos das últimas 3 horas.
        </div>

        <div id="mapStatus" class="status"></div>
        <div id="cityMini" class="city-mini"></div>
        <div id="smartHint" class="smart-hint"></div>
      </div>
    </section>
  </main>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

  <script>
    const SUPABASE_URL = "https://vehsnhwcriblssrtemgm.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZlaHNuaHdjcmlibHNzcnRlbWdtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxMDE0NjgsImV4cCI6MjA4ODY3NzQ2OH0.62z781RnSa8etnnWxRgjw0O8YC57mHQ5eK1IcYJeY1k";

    const TABLE_NAME = "registros";
    const EVENT_DURATION_MS = 3 * 60 * 60 * 1000;
    const MAP_ZOOM = 11;
    const AUTO_REFRESH_MS = 60 * 1000;
    const MIN_DISTANCE_METERS = 200;

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const $ = (id) => document.getElementById(id);

    const startScreen = $("startScreen");
    const mapScreen = $("mapScreen");

    const btnRain = $("btnRain");
    const btnCloud = $("btnCloud");
    const btnSun = $("btnSun");
    const btnStorm = $("btnStorm");
    const btnFrost = $("btnFrost");
    const btnHail = $("btnHail");
    const btnWind = $("btnWind");

    const btnWhats = $("btnWhats");
    const btnReset = $("btnReset");

    const statusEl = $("status");
    const mapStatusEl = $("mapStatus");
    const selectedWeatherText = $("selectedWeatherText");
    const selectedWeatherIcon = $("selectedWeatherIcon");
    const cityMini = $("cityMini");
    const smartHint = $("smartHint");

    let map = null;
    let selectedWeather = null;
    let currentCoords = null;
    let refreshTimer = null;
    let markerClusterGroup = null;

    const deviceId = getDeviceId();

    function getDeviceId() {
      const key = "aqui_ta_chovendo_device_id";
      let id = localStorage.getItem(key);

      if (!id) {
        id = "dev_" + crypto.randomUUID();
        localStorage.setItem(key, id);
      }

      return id;
    }

    function setStatus(message = "", type = "") {
      statusEl.textContent = message;
      statusEl.className = "status" + (type ? " " + type : "");
    }

    function setMapStatus(message = "", type = "") {
      mapStatusEl.textContent = message;
      mapStatusEl.className = "status" + (type ? " " + type : "");
    }

    function setButtonsDisabled(disabled) {
      btnRain.disabled = disabled;
      btnCloud.disabled = disabled;
      btnSun.disabled = disabled;
      btnStorm.disabled = disabled;
      btnFrost.disabled = disabled;
      btnHail.disabled = disabled;
      btnWind.disabled = disabled;
    }

    function getWeatherData(value) {
      if (value === "rain") return { icon: "🌧️", label: "Aqui tá chovendo" };
      if (value === "cloud") return { icon: "☁️", label: "Aqui tá nublado" };
      if (value === "sun") return { icon: "☀️", label: "Aqui tem sol" };
      if (value === "storm") return { icon: "🌩️", label: "Temporal" };
      if (value === "frost") return { icon: "❄️", label: "Geada" };
      if (value === "hail") return { icon: "🧊", label: "Granizo" };
      if (value === "wind") return { icon: "💨", label: "Ventania" };
      return { icon: "📍", label: "Sua resposta" };
    }

    function isValidWeatherType(value) {
      return ["rain","cloud","sun","storm","frost","hail","wind"].includes(value);
    }

    function isValidLatLng(lat, lng) {
      if (!Number.isFinite(lat) || !Number.isFinite(lng)) return false;
      if (lat < -34 || lat > 6) return false;
      if (lng < -74 || lng > -28) return false;
      return true;
    }

    function haversineMeters(lat1, lng1, lat2, lng2) {
      const R = 6371000;
      const toRad = (deg) => deg * Math.PI / 180;
      const dLat = toRad(lat2 - lat1);
      const dLng = toRad(lng2 - lng1);

      const a =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
        Math.sin(dLng / 2) * Math.sin(dLng / 2);

      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      return R * c;
    }

    function getCutoffIso() {
      return new Date(Date.now() - EVENT_DURATION_MS).toISOString();
    }

    function buildWeatherDivIcon(weatherValue, isOwn = false) {
      const weather = getWeatherData(weatherValue);

      if (isOwn) {
        return L.divIcon({
          className: "",
          html: `
            <div class="my-marker-wrap">
              <div class="my-ring"></div>
              <div class="my-weather-map-emoji">${weather.icon}</div>
            </div>
          `,
          iconSize: [40, 40],
          iconAnchor: [20, 20]
        });
      }

      return L.divIcon({
        className: "",
        html: `<div class="weather-map-emoji">${weather.icon}</div>`,
        iconSize: [36, 36],
        iconAnchor: [18, 18]
      });
    }

    function getCurrentPositionAsync() {
      return new Promise((resolve, reject) => {
        if (!navigator.geolocation) {
          reject(new Error("Seu navegador não suporta geolocalização."));
          return;
        }

        navigator.geolocation.getCurrentPosition(
          (position) => resolve(position),
          (error) => reject(error),
          {
            enableHighAccuracy: true,
            timeout: 15000,
            maximumAge: 0
          }
        );
      });
    }

    async function fetchActivePoints() {
      const cutoffIso = getCutoffIso();

      const { data, error } = await supabaseClient
        .from(TABLE_NAME)
        .select("device_id, weather_type, lat, lng, updated_at")
        .gte("updated_at", cutoffIso)
        .order("updated_at", { ascending: false });

      if (error) throw error;

      const seen = new Set();
      const filtered = [];

      for (const p of (data || [])) {
        if (!isValidWeatherType(p.weather_type)) continue;
        if (!isValidLatLng(Number(p.lat), Number(p.lng))) continue;
        if (seen.has(p.device_id)) continue;
        seen.add(p.device_id);
        filtered.push(p);
      }

      return filtered;
    }

    async function fetchOwnActivePoint() {
      const cutoffIso = getCutoffIso();

      const { data, error } = await supabaseClient
        .from(TABLE_NAME)
        .select("device_id, weather_type, lat, lng, updated_at")
        .eq("device_id", deviceId)
        .gte("updated_at", cutoffIso)
        .order("updated_at", { ascending: false })
        .limit(1);

      if (error) throw error;

      const row = data && data.length ? data[0] : null;
      if (!row) return null;
      if (!isValidWeatherType(row.weather_type)) return null;
      if (!isValidLatLng(Number(row.lat), Number(row.lng))) return null;

      return row;
    }

   async function saveVote(choice, lat, lng) {
  const nowIso = new Date().toISOString();

  const payload = {
    device_id: deviceId,
    weather_type: choice,
    lat,
    lng,
    updated_at: nowIso
  };

  const { error } = await supabaseClient
    .from(TABLE_NAME)
    .upsert(payload, { onConflict: "device_id" });

  if (error) throw error;
}
  

    function ensureMap(lat, lng) {
      const mapContainer = document.getElementById("map");

      if (!map) {
        map = L.map(mapContainer).setView([lat, lng], MAP_ZOOM);

        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
          maxZoom: 19,
          attribution: "&copy; OpenStreetMap"
        }).addTo(map);

        markerClusterGroup = L.markerClusterGroup({
          maxClusterRadius: 60,
          spiderfyOnMaxZoom: true,
          showCoverageOnHover: false,
          zoomToBoundsOnClick: true,
          iconCreateFunction: function(cluster) {
            const markers = cluster.getAllChildMarkers();
            const counts = {};

            for (const marker of markers) {
              const w = marker.options.weatherType || "rain";
              counts[w] = (counts[w] || 0) + 1;
            }

            let dominantType = "rain";
            let dominantCount = 0;

            for (const [type, count] of Object.entries(counts)) {
              if (count > dominantCount) {
                dominantType = type;
                dominantCount = count;
              }
            }

            const dominant = getWeatherData(dominantType);

            return L.divIcon({
              html: `
                <div class="cluster-bubble">
                  <span class="cluster-emoji">${dominant.icon}</span>
                  <span class="cluster-count">${markers.length}</span>
                </div>
              `,
              className: "custom-cluster",
              iconSize: [52, 48],
              iconAnchor: [26, 24]
            });
          }
        });

        map.addLayer(markerClusterGroup);
      } else {
        map.setView([lat, lng], MAP_ZOOM);
      }

      setTimeout(() => map.invalidateSize(), 250);
    }

    async function renderActivePoints(centerLat = null, centerLng = null) {
      const points = await fetchActivePoints();

      if (!map && points.length) {
        ensureMap(centerLat ?? Number(points[0].lat), centerLng ?? Number(points[0].lng));
      }

      if (markerClusterGroup) {
        markerClusterGroup.clearLayers();
      }

      if (!points.length) {
        cityMini.textContent = "Nenhum ponto ativo no momento.";
        smartHint.textContent = "";
        return;
      }

      let ownFound = false;

      for (const point of points) {
        const isOwn = point.device_id === deviceId;
        const marker = L.marker([Number(point.lat), Number(point.lng)], {
          icon: buildWeatherDivIcon(point.weather_type, isOwn)
        });

        marker.options.weatherType = point.weather_type;
        marker.options.isOwn = isOwn;

        if (isOwn) ownFound = true;

        markerClusterGroup.addLayer(marker);
      }

      cityMini.textContent = points.length === 1
        ? "1 ponto ativo nas últimas 3 horas."
        : `${points.length} pontos ativos nas últimas 3 horas.`;

      smartHint.textContent = ownFound
        ? "Seu ponto está destacado com um anel discreto."
        : "";

      if (centerLat !== null && centerLng !== null && map) {
        map.setView([centerLat, centerLng], MAP_ZOOM);
      }
    }

    async function showMapScreen(choice, lat, lng) {
      const weather = getWeatherData(choice);

      selectedWeather = choice;
      currentCoords = { lat, lng };

      selectedWeatherText.textContent = weather.label;
      selectedWeatherIcon.textContent = weather.icon;

      startScreen.classList.add("hidden");
      mapScreen.classList.remove("hidden");

      ensureMap(lat, lng);
      await renderActivePoints(lat, lng);
    }

    function startAutoRefresh() {
      stopAutoRefresh();

      refreshTimer = setInterval(async () => {
        try {
          await renderActivePoints(
            currentCoords ? currentCoords.lat : null,
            currentCoords ? currentCoords.lng : null
          );
        } catch (err) {
          console.error(err);
        }
      }, AUTO_REFRESH_MS);
    }

    function stopAutoRefresh() {
      if (refreshTimer) {
        clearInterval(refreshTimer);
        refreshTimer = null;
      }
    }

    async function saveOrUpdateVote(choice) {
      const position = await getCurrentPositionAsync();
      const freshLat = position.coords.latitude;
      const freshLng = position.coords.longitude;

      if (!isValidLatLng(freshLat, freshLng)) {
        throw new Error("Localização inválida.");
      }

      let finalLat = freshLat;
      let finalLng = freshLng;

      const previous = await fetchOwnActivePoint();

      if (previous) {
        const dist = haversineMeters(
          Number(previous.lat),
          Number(previous.lng),
          freshLat,
          freshLng
        );

        if (dist < MIN_DISTANCE_METERS) {
          finalLat = Number(previous.lat);
          finalLng = Number(previous.lng);
        }
      }

      await saveVote(choice, finalLat, finalLng);

      return { lat: finalLat, lng: finalLng };
    }

    async function handleVote(choice) {
      try {
        if (!isValidWeatherType(choice)) {
          throw new Error("Clima inválido.");
        }

        setButtonsDisabled(true);
        setStatus("Obtendo sua localização...");

        const result = await saveOrUpdateVote(choice);

        setStatus("");
        await showMapScreen(choice, result.lat, result.lng);
        setMapStatus("Ponto salvo com sucesso. Ele ficará ativo por 3 horas.", "ok");
        startAutoRefresh();
      } catch (err) {
        console.error(err);

        let msg = "Não foi possível continuar.";

        if (err && typeof err.code !== "undefined") {
          if (err.code === 1) msg = "Permissão de localização negada.";
          else if (err.code === 2) msg = "Não foi possível obter sua localização.";
          else if (err.code === 3) msg = "Tempo esgotado ao buscar localização.";
        } else if (err.message) {
          msg = err.message;
        }

        setStatus(msg, "err");
      } finally {
        setButtonsDisabled(false);
      }
    }

    function shareWhatsApp() {
      const url = window.location.href;
      const weather = getWeatherData(selectedWeather);

      const msg =
        "Como está o tempo aí na sua cidade agora?\n\n" +
        "Eu marquei: " + weather.label + "\n\n" +
        "Veja e marque também:\n" +
        url;

      const shareUrl = "https://wa.me/?text=" + encodeURIComponent(msg);
      window.open(shareUrl, "_blank");
    }

    async function resetView() {
      stopAutoRefresh();

      mapScreen.classList.add("hidden");
      startScreen.classList.remove("hidden");

      setMapStatus("");
      cityMini.textContent = "";
      smartHint.textContent = "";

      try {
        const ownPoint = await fetchOwnActivePoint();

        if (ownPoint) {
          setStatus("Você já marcou nas últimas 3 horas. Escolha outro clima para atualizar.", "ok");
        } else {
          setStatus("");
        }
      } catch (err) {
        console.error(err);
        setStatus("");
      }
    }

    async function initApp() {
      try {
        setStatus("Carregando...");

        const ownPoint = await fetchOwnActivePoint();

        if (ownPoint) {
          setStatus("");
          await showMapScreen(
            ownPoint.weather_type,
            Number(ownPoint.lat),
            Number(ownPoint.lng)
          );
          setMapStatus("Seu ponto ainda está ativo. Se quiser, volte e atualize o clima.", "ok");
          startAutoRefresh();
        } else {
          setStatus("");
        }
      } catch (err) {
        console.error(err);
        setStatus("Erro ao carregar dados do mapa.", "err");
      }
    }

    btnRain.addEventListener("click", () => handleVote("rain"));
    btnCloud.addEventListener("click", () => handleVote("cloud"));
    btnSun.addEventListener("click", () => handleVote("sun"));
    btnStorm.addEventListener("click", () => handleVote("storm"));
    btnFrost.addEventListener("click", () => handleVote("frost"));
    btnHail.addEventListener("click", () => handleVote("hail"));
    btnWind.addEventListener("click", () => handleVote("wind"));

    btnWhats.addEventListener("click", shareWhatsApp);
    btnReset.addEventListener("click", resetView);

  
    initApp();
  </script>
</body>
</html>
